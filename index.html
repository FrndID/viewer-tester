<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solar System Visualization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-950 overflow-hidden text-white w-screen h-screen relative flex items-center justify-center">

    <div class="absolute top-4 left-4 z-50 flex gap-4 items-center bg-gray-900/80 p-4 rounded-xl border border-gray-700 backdrop-blur-sm">
        <button id="btn-toggle" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-lg font-semibold transition">⏸ Pause</button>
        <div class="flex items-center gap-2">
            <label for="zoom" class="text-sm">Zoom</label>
            <input type="range" id="zoom" min="0.3" max="2" step="0.1" value="1" class="cursor-pointer">
        </div>
    </div>

    <div id="tooltip" class="absolute hidden z-50 bg-gray-900 text-white px-3 py-1 rounded-md border border-gray-600 shadow-lg pointer-events-none transition-opacity">
        <span id="tooltip-name" class="font-bold"></span>
    </div>

    <div id="universe" class="relative w-full h-full flex items-center justify-center transition-transform duration-200">
        <div id="solar-system" class="relative flex items-center justify-center">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
